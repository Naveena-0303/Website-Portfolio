<!DOCTYPE html>
<html lang="en">
  <head>

    <title>Naveena Sivakumar | Home</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="home">
    <header class="site-header">
      <a class="logo-link" href="index.html" aria-label="Go to home page">
        <img src="Assets/Logo.png" alt="Naveena Sivakumar logo" class="site-logo" />
      </a>

      <p class="site-name">Naveena Sivakumar</p>

      <div class="header-right">
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="work.html">Work</a>
          <a href="profile.html">Profile</a>

        </nav>

        <div class="eyes" aria-hidden="true">

          </div>
          <div class="eye">
            <span class="pupil"></span>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="hero" aria-label="Home hero section">
        <div class="hero-video-shell">
          <video
            class="hero-video"
            src="Assets/Hero-Video_1.mp4"
            autoplay
            muted
            loop
            playsinline
          ></video>
        </div>

        <div class="hero-overlay" aria-hidden="true">
          <p class="hero-year">2026</p>
          <h1 class="hero-title">Portfolio</h1>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-left">
        <img src="Assets/Logo.png" alt="Naveena Sivakumar logo" class="footer-logo" />
        <p class="footer-copy">© 2026 Naveena Sivakumar</p>
      </div>

      <div class="footer-right">
        <a
          class="footer-social"
          href="mailto:naveenasivakumar.official@gmail.com"
          aria-label="Send an email"
        >
          <img
            class="footer-social-icon"
            src="Icons/Mail icon.svg"
            alt=""
            aria-hidden="true"
          />
        </a>
        <a
          class="footer-social"
          href="https://wa.me/916374280667"
          target="_blank"
          rel="noreferrer"
          aria-label="Open WhatsApp"
        >
          <img
            class="footer-social-icon"
            src="Icons/Whatsapp icon.svg"
            alt=""
            aria-hidden="true"
          />
        </a>
        <a class="footer-social" href="tel:6374280667" aria-label="Call 6374280667">
          <img class="footer-social-icon" src="Icons/Call icon.jpg" alt="" aria-hidden="true" />
        </a>
