<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naveena Sivakumar | Home</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="home">
    <header class="site-header">
      <a class="logo-link" href="index.html" aria-label="Go to home page">
        <img src="Assets/Logo.png" alt="Naveena Sivakumar logo" class="site-logo" />
      </a>

      <p class="site-name">Naveena Sivakumar</p>

      <div class="header-right">
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="work.html">Work</a>
          <a href="profile.html">Profile</a>
          <a href="feedback.html">Feedback</a>
        </nav>

        <div class="eyes" aria-hidden="true">
          <div class="eye">
            <span class="pupil"></span>
          </div>
          <div class="eye">
            <span class="pupil"></span>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="hero" aria-label="Home hero section">
        <div class="hero-video-shell">
          <video
            class="hero-video"
            src="Assets/Hero-Video_1.mp4"
            autoplay
            muted
            loop
            playsinline
          ></video>
        </div>

        <div class="hero-overlay" aria-hidden="true">
          <p class="hero-year">2026</p>
          <h1 class="hero-title">Portfolio</h1>
        </div>
      </section>

      <section class="home-top-projects" aria-label="Top projects">
        <div class="home-top-projects-copy">
                    <h2 class="home-top-projects-title">Top Projects</h2>
          <p class="home-top-projects-subtitle">Selected works that define my recent design direction.</p>
        </div>

        <div class="top-projects-stack">
          <a class="top-project-card top-project-card-center" href="project.html?slug=badaga" aria-label="Open Badaga project">
            <img src="Projects/Badaga/cover.jpg" alt="Badaga project cover" />
          </a>
          <a class="top-project-card top-project-card-left" href="project.html?slug=koo-app-revamp" aria-label="Open Koo App Revamp project">
            <img src="Projects/Koo app - revamp/cover.jpg" alt="Koo App Revamp project cover" />
          </a>
          <a class="top-project-card top-project-card-right" href="project.html?slug=Wrapped%20Realities" aria-label="Open Wrapped Realities project">
            <img src="Projects/Wrapped Realities/Cover.jpg" alt="Wrapped Realities project cover" />
          </a>
        </div>

        <div class="top-projects-controls" aria-label="Top projects controls">
          <div class="top-projects-dots" role="tablist" aria-label="Choose top project">
            <button class="top-projects-dot" type="button" data-card-index="0" aria-label="Show first project"></button>
            <button class="top-projects-dot" type="button" data-card-index="1" aria-label="Show second project"></button>
            <button class="top-projects-dot" type="button" data-card-index="2" aria-label="Show third project"></button>
          </div>
        </div>

        <div class="home-view-all-wrap">
          <a class="home-view-all-button" href="work.html">View All</a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-left">
        <img src="Assets/Logo.png" alt="Naveena Sivakumar logo" class="footer-logo" />
        <p class="footer-copy">© 2026 Naveena Sivakumar</p>
      </div>

      <div class="footer-right">
        <a
          class="footer-social"
          href="mailto:naveenasivakumar.official@gmail.com"
          aria-label="Send an email"
        >
          <img
            class="footer-social-icon"
            src="Icons/Mail icon.jpg"
            alt=""
            aria-hidden="true"
          />
        </a>
        <a
          class="footer-social"
          href="https://wa.me/916374280667"
          target="_blank"
          rel="noreferrer"
          aria-label="Open WhatsApp"
        >
          <img
            class="footer-social-icon"
            src="Icons/Whatsapp icon.svg"
            alt=""
            aria-hidden="true"
          />
        </a>
        <a class="footer-social" href="tel:6374280667" aria-label="Call 6374280667">
          <img class="footer-social-icon" src="Icons/Call icon.svg" alt="" aria-hidden="true" />
        </a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
