<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naveena Sivakumar | Feedback</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="feedback">
    <header class="site-header">
      <a class="logo-link" href="index.html" aria-label="Go to home page">
        <img src="Assets/Logo.png" alt="Naveena Sivakumar logo" class="site-logo" />
      </a>

        <button class="hamburger-menu" aria-label="Toggle navigation menu" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav mobile-nav" aria-label="Primary navigation">
          <a href="work.html">Work</a>
          <a href="profile.html">Profile</a>
          <a href="feedback.html">Feedback</a>
        </nav>
    </header>

    <main class="feedback-main">
      <section class="feedback-section">
        <h1 class="feedback-heading">Feedback</h1>
        <p class="feedback-subheading">
          Feel free to leave a note, share your thoughts, or tell me what stood out to you.
        </p>

        <form
          class="feedback-form"
          action="https://formspree.io/f/mbdqljyj"
          method="POST"
        >
          <label class="feedback-field">
            <span>Your Name</span>
            <input type="text" name="name" placeholder="Enter your name" />
          </label>

          <label class="feedback-field">
            <span>Mail / Mobile Number</span>
            <input
              type="text"
              name="contact"
              placeholder="Enter your email or phone number"
            />
          </label>

          <label class="feedback-field feedback-field-full">
            <span>Feedback</span>
            <textarea
              name="feedback"
              rows="8"
              placeholder="Write your feedback here"
            ></textarea>
          </label>

          <input type="hidden" name="_subject" value="New portfolio feedback submission" />
          <input type="hidden" name="_format" value="plain" />

          <div class="feedback-actions">
            <button class="feedback-submit" type="submit">Submit Feedback</button>
          </div>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-left">
        <img src="Assets/Logo.png" alt="Naveena Sivakumar logo" class="footer-logo" />
        <p class="footer-copy">© 2026 Naveena Sivakumar</p>
      </div>

      <div class="footer-right">
        <a
          class="footer-social"
          href="mailto:naveenasivakumar.official@gmail.com"
          aria-label="Send an email"
        >
          <img
            class="footer-social-icon"
            src="Icons/Mail icon.jpg"
            alt=""
            aria-hidden="true"
          />
        </a>
        <a
          class="footer-social"
          href="https://wa.me/916374280667"
          target="_blank"
          rel="noreferrer"
          aria-label="Open WhatsApp"
        >
          <img
            class="footer-social-icon"
            src="Icons/Whatsapp icon.svg"
            alt=""
            aria-hidden="true"
          />
        </a>
        <a class="footer-social" href="tel:6374280667" aria-label="Call 6374280667">
          <img class="footer-social-icon" src="Icons/Call icon.svg" alt="" aria-hidden="true" />
        </a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
